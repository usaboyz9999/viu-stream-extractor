name: Viu Stream Extractor

on:
  workflow_dispatch:
  schedule:
    - cron: '0 */6 * * *'
  push:
    branches: [main]
    paths:
      - 'extractor.js'
      - 'package.json'
      - '.github/workflows/extract.yml'

jobs:
  extract:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install deps
        run: npm install

      - name: Run extractor
        run: npm run extract
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Commit if changed
        run: bash .github/scripts/commit-changes.sh
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
