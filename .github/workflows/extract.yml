name: Viu Stream Extractor

on:
  workflow_dispatch:
  schedule:
    - cron: '0 */6 * * *'
  push:
    branches: [main]
    paths:
      - 'extractor.js'
      - 'package.json'
      - '.github/workflows/extract.yml'

jobs:
  extract:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install deps
        run: npm install

      - name: Run extractor
        run: npm run extract

      - name: Commit and push if changed
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add viu_links.json
          if ! git diff --staged --quiet; then
            git commit -m "🔄 auto-update: viu_links.json"
            git push
          else
            echo "ℹ️ No changes to commit"
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
