# .github/workflows/extract.yml
# سير عمل سحابي لاستخراج روابط بث Viu.com تلقائياً
# 🆓 مجاني 100% عبر GitHub Actions

name: 🎬 Viu Stream Extractor

# 🔄 متى يُشغّل هذا السير العمل؟
on:
  # 1️⃣ تشغيل يدوي عند الضغط على زر في GitHub
  workflow_dispatch:
    inputs:
      episode_id:
        description: 'معرف الحلقة للاستخراج (اختياري - اتركه فارغاً لاستخراج الكل)'
        required: false
        type: string
  
  # 2️⃣ جدولة تلقائية (كل 6 ساعات) - عدّل حسب الحاجة
  schedule:
    # ⏰ cron format: دقيقة ساعة يوم_الشهر شهر يوم_الأسبوع
    # هذا يعني: كل 6 ساعات (00:00, 06:00, 12:00, 18:00 بتوقيت UTC)
    - cron: '0 */6 * * *'
  
  # 3️⃣ عند دفع تغييرات لفرع main (للاختبار)
  push:
    branches: [main]
    paths:
      - 'extractor.js'
      - 'package.json'
      - '.github/workflows/extract.yml'

# 🔧 وظائف السير العمل
jobs:
  extract-links:
    name: 🤖 استخراج الروابط
    runs-on: ubuntu-latest  # نظام لينكس على سحابة GitHub
    
    # ⏱️ مهلة التنفيذ القصوى
    timeout-minutes: 15
    
    steps:
      # 1️⃣ جلب كود المستودع
      - name: 📥 Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # جلب كامل التاريخ للتحقق من التغييرات
      
      # 2️⃣ إعداد بيئة Node.js
      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'  # تسريع التثبيت بالكاش
      
      # 3️⃣ تثبيت الاعتمادات
      - name: 📦 Install dependencies
        run: npm install --prefer-offline
      
      # 4️⃣ تشغيل سكريبت الاستخراج
      - name: 🎯 Run extractor
        run: npm run extract
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      
      # 5️⃣ عرض ملف النتيجة في السجل (للتدقيق)
      - name: 📋 Show extracted links
        run: |
          echo "=== محتوى viu_links.json ==="
          cat viu_links.json || echo "⚠️ الملف غير موجود"
          echo "=============================="
      
      # 6️⃣ حفظ التغييرات في المستودع (تحديث viu_links.json)
      - name: 💾 Commit updated links
        run: |
            # التحقق من وجود تغييرات
          if [ -f viu_links.json ] && [ -s viu_links.json ]; then
            # إعداد هوية الـ commit
            git config --local user.email "github-actions[bot]@users.noreply.github.com"
            git config --local user.name "github-actions[bot]"
            
            # إضافة الملف للـ commit
            git add viu_links.json
            
            # إنشاء رسالة commit ذكية
            COMMIT_MSG="🔄 تحديث روابط البث [Auto]

            - تم الاستخراج بواسطة: GitHub Actions
            - وقت التشغيل: $(date -u +'%Y-%m-%d %H:%M:%S UTC')
            - Run ID: ${GITHUB_RUN_ID}
            
            🤖 Auto-generated by viu-stream-extractor"
            
            # تنفيذ الـ commit فقط إذا كان هناك تغييرات
            if ! git diff --staged --quiet; then
              git commit -m "$COMMIT_MSG"
              echo "✅ تم إنشاء commit جديد لـ viu_links.json"
            else
              echo "ℹ️ لا توجد تغييرات في viu_links.json"
            fi
          else
            echo "⚠️ ملف viu_links.json غير موجود أو فارغ"
          fi
      
      # 7️⃣ رفع التغييرات إلى GitHub
      - name: 🚀 Push changes
        run: git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      
      # 8️⃣ إرسال إشعار (اختياري - يمكن تفعيله لاحقاً)
      - name: 🔔 Notify completion
        if: always()
        run: |
          echo "✅ اكتمل سير العمل: ${{ job.status }}"
          echo "📊 روابط مستخرجة: ${{ steps.extract.outputs.success_count }} / ${{ steps.extract.outputs.total_count }}"
